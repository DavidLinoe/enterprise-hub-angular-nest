<div class="flex flex-col items-center justify-center w-full h-full">
  <form
    [formGroup]="signUpForm"
    (ngSubmit)="signUp()"
    class="w-96 gap-4 p-10 bg-primary-dark flex flex-col rounded-lg shadow-lg"
  >
    <h1 class="text-2xl text-primary-text text-center mb-2">Sign up</h1>

    <div class="flex flex-col gap-1">
      <label class="text-sm text-primary-text">Name</label>
      <input
        type="text"
        formControlName="name"
        placeholder="Full name"
        class="px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm text-primary-text">Email</label>
      <input
        type="email"
        formControlName="email"
        placeholder="name@example.com"
        class="px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm text-primary-text">Password</label>
      <input
        type="password"
        formControlName="password"
        placeholder="••••••••"
        class="px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm text-primary-text">Confirm password</label>
      <input
        type="password"
        formControlName="confirmPassword"
        placeholder="••••••••"
        class="px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>


    @if (signUpForm.errors?.['passwordMismatch'] && signUpForm.get('confirmPassword')?.touched) {
      <p class="text-sm text-red-400">Passwords do not match</p>
    }

    @if (errorMessage) {
      <p class="text-sm text-red-400">{{ errorMessage }}</p>
    }

    <button
      type="submit"
      [disabled]="loading"
      class="mt-2 px-4 py-2 rounded-md bg-blue-600 text-white font-medium hover:bg-blue-700 disabled:opacity-60"
    >
      {{ loading ? 'Creating...' : 'Sign up' }}
    </button>

    <p class="text-sm text-primary-text text-center">
      Already have an account?
      <a routerLink="/sign-in" class="text-blue-300 hover:underline">Log in</a>
    </p>
  </form>
</div>
