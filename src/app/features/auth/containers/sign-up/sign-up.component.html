<div class="flex flex-col items-center justify-center w-full h-full">
  <form
    class="w-96 gap-6 p-14 bg-primary-dark flex flex-col items-center justify-center rounded-lg"
  >
    <h1 class="text-2xl text-primary-text">Sign up</h1>
    <input placeholder="Email" type="email" name="email" id="email" />
    <input placeholder="Password" type="password" name="password" id="password" />
    <input placeholder="Confirm Password" type="password" name="confirm-password" id="confirm-password" />
    <input placeholder="First Name" type="text" name="first-name" id="first-name" />
    <input placeholder="Last Name" type="text" name="last-name" id="last-name" />

    <button type="submit">Sign up</button>
  </form>
</div>
