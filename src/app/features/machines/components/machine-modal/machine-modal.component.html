<form [formGroup]="form()" class="flex flex-col gap-4 py-4">
  @if (form().get('id')?.value) {
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-600">ID</label>
      <input
        type="text"
        formControlName="id"
        readonly
        class="px-3 py-2 rounded-md border border-gray-200 bg-gray-100 text-gray-500 cursor-not-allowed focus:outline-none"
      />
    </div>
  }

  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium text-gray-700">Name</label>
    <input
      type="text"
      formControlName="name"
      placeholder="Enter machine name"
      class="px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
    />
  </div>

  <div class="flex flex-col gap-1">

      type="text"
      formControlName="model"
      placeholder="Enter model"
      class="px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
    />
  </div> -->

  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium text-gray-700">Serial Number</label>
    <input
      type="text"
      formControlName="serialNumber"
      placeholder="Enter serial number"
      class="px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
    />
  </div>

  <!-- <div class="flex flex-col gap-1">
    <label class="text-sm font-medium text-gray-700">Status</label>
    <select
      formControlName="status"
      class="px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
