<component-totalizer
  [count]="10"
  [title]="'Users'"
  [actions]="[
    {
      label: 'Create',
      icon: '+',
      callback: (item) => createUser(),
    },
  ]"
></component-totalizer>

<component-table
  [items]="usersFacade.users$ | async"
  [columns]="[
    { name: 'id', label: 'ID' },
    { name: 'name', label: 'Name' },
    { name: 'email', label: 'Email' },
    { name: 'actions', label: 'Actions' },
  ]"
  [actions]="[
    {
      label: 'Edit',
      icon: 'edit',
      callback: (item) => updateUser(item),
    },
    {
      label: 'Delete',
      icon: 'delete',
      callback: (item) => deleteUser(item),
    },
  ]"
></component-table>

<component-modal
  [open]="open"
  [buttons]="[
    {
      label: 'Create',
      disabled: false,
      callback: (item) => createUser(),
    },
  ]"
  (close)="open = false"
  [title]="'Test Modal'"
>
  <feature-users-component-user-modal [form]="userFormGroup"></feature-users-component-user-modal>
</component-modal>
